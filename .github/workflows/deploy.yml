name: Deploy nexroom to 10xvick.github.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout nexroom source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build
        run: npm run build
        working-directory: client

      - name: Checkout 10xvick.github.io
        uses: actions/checkout@v4
        with:
          repository: 10xvick/10xvick.github.io
          token: ${{ secrets.GH_PAGES_DEPLOY_PAT }}
          path: pages-repo

      - name: Copy build output
        run: |
          mkdir -p pages-repo/tools/social/nexroom
          rm -rf pages-repo/tools/social/nexroom/*
          cp -r client/dist/. pages-repo/tools/social/nexroom/

      - name: Commit and push
        run: |
          cd pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/social/nexroom
          git diff --cached --quiet || git commit -m "chore: deploy nexroom [$(date -u +'%Y-%m-%dT%H:%M:%SZ')]"
          git push
