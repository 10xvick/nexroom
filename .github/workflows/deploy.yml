name: Deploy nexroom to 10xvick.github.io

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout nexroom source
        uses: actions/checkout@v6
        with:
          path: nexroom

      - name: Checkout shared-chat
        uses: actions/checkout@v6
        with:
          repository: 10xvick/shared-chat
          path: shared-chat

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: nexroom/client/package-lock.json

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install shared-chat dependencies
        run: npm install
        working-directory: shared-chat

      - name: Build shared-chat
        run: npm run build
        working-directory: shared-chat

      - name: Install client dependencies
        run: npm install
        working-directory: nexroom/client

      - name: Build client
        run: npm run build
        working-directory: nexroom/client

      - name: Checkout 10xvick.github.io
        uses: actions/checkout@v6
        with:
          repository: 10xvick/10xvick.github.io
          token: ${{ secrets.GH_PAGES_DEPLOY_PAT }}
          path: pages-repo

      - name: Create deployment directory
        run: mkdir -p pages-repo/tools/social/nexroom

      - name: Copy built files
        run: cp -r nexroom/client/dist/. pages-repo/tools/social/nexroom/

      - name: Configure git
        working-directory: pages-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        working-directory: pages-repo
        run: |
          git add tools/social/nexroom
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Deploy nexroom build"
            git push
          fi
